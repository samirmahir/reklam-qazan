<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reklam Pay - Qazan</title>
    <script src="https://telegram.org"></script>
    <!-- Sənin Monetag Kodun -->
    <script src='//://libtl.com' data-zone='10727336' data-sdk='show_10727336'></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; /* Qara Arxa Fon */
            color: #ffffff;
            margin: 0; 
            padding: 20px; 
        }
        .header { 
            background: #FFD700; /* Sarı Başlıq */
            color: #000; 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            margin-bottom: 25px;
        }
        .card { 
            background: #1E1E1E; /* Tünd Qara Kart */
            border: 2px solid #0056b3; /* Mavi Haşiyə */
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
        }
        .btn { 
            background: linear-gradient(45deg, #0056b3, #007bff); /* Mavi Düymə */
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 50px; 
            font-size: 20px; 
            font-weight: bold;
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        #balance { color: #000; font-weight: 900; }
        #limit { color: #FFD700; font-size: 45px; margin: 10px 0; }
        p { color: #b0b0b0; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; font-size: 18px;">REKLAM PAY</div>
        <div style="font-weight:bold;">Balans: <span id="balance">0.0000</span> AZN</div>
    </div>

    <div class="card">
        <p>Gündəlik Reklam Limiti</p>
        <h1 id="limit">0 / 25</h1>
        <button class="btn" onclick="showAd()">▶ REKLAM İZLƏ</button>
    </div>

    <div style="margin-top: 30px; font-size: 12px; color: #555;">
        Professional Qazan Sistemi v3.0
    </div>

    <script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Ekranı tam aç

    function showAd() {
        // Monetag-ın reklam funksiyasını dəqiq çağırırıq
        if (typeof show_10727336 === 'function') {
            show_10727336().then(() => {
                alert("Təbriklər qaqam! Reklam izlənildi, balansın yenilənəcək.");
                // Gələcəkdə bota məlumat göndərmək üçün:
                // tg.sendData("reklam_izlendi"); 
            }).catch((err) => {
                alert("Reklamda xəta baş verdi, bir az sonra yoxla.");
                console.error(err);
            });
        } else {
            alert("Reklam hələ yüklənməyib. Zəhmət olmasa 5-10 saniyə gözlə qaqam.");
        }
    }
