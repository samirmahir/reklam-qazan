<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reklam Pay - Qazan</title>
    <script src="https://telegram.org"></script>
    <!-- Sənin Monetag Kodun -->
    <script src='//libtl.com/sdk.js' data-zone='10727336' data-sdk='show_10727336'></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { background: red; color: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: red; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 10px; }
        .balance { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold;">REKLAM</div>
        <div>Balansınız: <span id="balance">0.0000</span>₼</div>
    </div>

    <h2 style="color:red;">Reklam Pay-a Xoş Gəlmisiniz</h2>

    <div class="card">
        <h1 id="limit">0/25</h1>
        <p>Gündəlik Reklam Limiti</p>
        <button class="btn" onclick="showAd()">▶ Reklam İzlə</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ekranı tam aç

        function showAd() {
            // Monetag reklamını çağırırıq
            if (typeof show_10727336 === 'function') {
                show_10727336().then(() => {
                    alert("Reklam izlənildi! Balansınıza xal əlavə olundu.");
                    // Bura gələcəkdə balans artırma kodu yazacağıq
                });
            } else {
                alert("Reklam hələ yüklənməyib, bir az gözlə qaqam.");
            }
        }
    </script>
</body>
</html>
