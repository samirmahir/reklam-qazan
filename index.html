<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reklam Pay - Qazan</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org"></script>
    <!-- Monetag Reklam SDK (Zone: 10727336) -->
    <script src="https://alwingulla.com" data-zone="10727336" data-sdk="show_10727336"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f0f0f; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .header { 
            background: linear-gradient(135deg, #FFD700, #FFA500); 
            color: #000; 
            padding: 15px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 400px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            margin-bottom: 25px;
            font-weight: bold;
        }
        .card { 
            background: #1a1a1a; 
            border: 2px solid #007bff; 
            border-radius: 20px; 
            padding: 30px; 
            text-align: center;
            width: 100%; 
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .btn { 
            background: linear-gradient(45deg, #0056b3, #007bff); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 50px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            width: 100%; 
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        #limit { color: #FFD700; font-size: 40px; margin: 15px 0; }
        .footer { margin-top: 40px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <span>REKLAM PAY</span>
        <span>Balans: <span id="balance">0.00</span> AZN</span>
    </div>

    <div class="card">
        <p style="color: #bbb; margin: 0;">Gündəlik Reklam Limiti</p>
        <h1 id="limit">0 / 25</h1>
        <button class="btn" onclick="runAd()">▶ REKLAM İZLƏ</button>
    </div>

    <div class="footer">Professional Qazan Sistemi v3.1</div>

    <script>
        // Telegram WebApp Başlat
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        function runAd() {
            // Monetag funksiyasının olub olmadığını yoxlayırıq
            if (typeof show_10727336 === 'function') {
                show_10727336().then(() => {
                    alert("Təbriklər qaqam! Reklam izlənildi, balansa əlavə olunacaq.");
                    // Gələcəkdə bura balans artırma funksiyası yaza bilərik
                }).catch((err) => {
                    alert("Reklam hələ tam yüklənməyib, 5 saniyə sonra bir daha yoxla.");
                    console.error("Reklam xətası:", err);
                });
            } else {
                alert("Reklam xidməti yüklənir... Zəhmət olmasa gözlə.");
            }
        }
    </script>

</body>
</html>
