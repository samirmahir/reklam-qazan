<script>
    let tg = window.Telegram.WebApp;
    if (tg) {
        tg.expand(); // Ekranı tam aç
    }

    function showAd() {
        // Monetag SDK-nın yüklənib-yüklənmədiyini yoxlayırıq
        if (typeof show_10727336 === 'function') {
            show_10727336().then(() => {
                // Reklam uğurla göstərildi
                alert("Təbriklər qaqam! Reklam izlənildi, balansın yenilənəcək.");
                // Bura balans artırma kodlarını əlavə edə bilərsən
            }).catch((err) => {
                // Reklam yüklənməyəndə və ya istifadəçi bağlayanda
                alert("Reklam hələ hazır deyil və ya xəta baş verdi.");
                console.error("Xəta:", err);
            });
        } else {
            // Əgər script hələ tam yüklənməyibsə
            alert("Reklam yüklənir... 5 saniyə sonra yenidən bas qaqam.");
        }
    }
</script>
